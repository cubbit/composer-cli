name: Build and Upload

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches:
      - main
    paths:
      - ".cz.yaml"
permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: .
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3
      - name: Setup Bazel
        uses: abhinavsingh/setup-bazel@v3
        with:
            version: 5.4.0
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"
  build:
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      matrix:
        platform:
          - linux_386
          - linux_amd64
          - linux_arm
          - linux_arm64
          - darwin_amd64
          - darwin_arm64
          - windows_amd64
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Configure Bazel
        shell: bash
        run: |
            echo "build --symlink_prefix=dist/" >> .bazelrc.user            
        working-directory: .
      - name: Build and package for ${{ matrix.platform }}
        id: build
        run: |
          export GOOS=$(echo "${{ matrix.platform }}" | cut -d'_' -f1)
          export GOARCH=$(echo "${{ matrix.platform }}" | cut -d'_' -f2)
          BINARY_NAME="cli"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          echo "binary_name=$BINARY_NAME" >> $GITHUB_OUTPUT
          echo "op_sys=$GOOS" >> $GITHUB_OUTPUT
          echo "cpu_arch=$GOARCH" >> $GITHUB_OUTPUT
          bazel build --platforms=@io_bazel_rules_go//go/toolchain:${{ matrix.platform }} //:cli
      - name: Upload artifact for ${{ matrix.platform }}
        uses: actions/upload-artifact@v2
        with:
          name: "${{ matrix.platform }}_artifact"
          path: ./dist/bin/cli_/${{ steps.build.outputs.binary_name }}
      - name: Upload ${{ matrix.platform }}  to Cubbit S3
        run: |
          GOOS=$(echo "${{ matrix.platform }}" | cut -d'_' -f1)
          BINARY_NAME="cubbit-operator-cli"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          AWS_DEFAULT_REGION=eu-west-1 AWS_ACCESS_KEY_ID=${{ secrets.CUBBIT_S3_ACCESS_KEY }} AWS_SECRET_ACCESS_KEY=${{ secrets.CUBBIT_S3_SECRET_KEY }} \
          aws s3api --no-cli-pager --endpoint-url https://s3.cubbit.eu \
          put-object \
          --acl public-read \
          --bucket cubbit-public \
          --key operator-cli/${{ steps.build.outputs.op_sys }}/${{ steps.build.outputs.cpu_arch }}/${BINARY_NAME} \
          --body ./dist/bin/cli_/${{ steps.build.outputs.binary_name }}
