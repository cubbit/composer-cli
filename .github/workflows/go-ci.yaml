name: Go build 
on:
  pull_request:
    paths:
      - "main.go"
      - "src/**"
      - "constants/**"
      - "utils/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Setup Bazel
        uses: abhinavsingh/setup-bazel@v3
        with:
            version: 5.4.0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Build
        run: bazel build //...
