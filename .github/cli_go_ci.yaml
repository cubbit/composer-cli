name: Go build
on:
  pull_request:
    paths:
      - "main.go"
      - "src/**"
      - "constants/**"
      - "utils/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.20"

      - name: Build
        run: |
          go build -o composer-cli main.go
